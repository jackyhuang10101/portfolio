<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>像素採集測試</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>像素採集測試</h1>
        <input type="text" id="playerName" placeholder="輸入你的勇者名稱" class="pixel-input">
        
        <button id="clickBtn" class="pixel-btn">採集金幣</button>
        <p>目前採集量： <span id="score">0</span></p>

        <div class="leaderboard-box">
            <h2>🏆 放置英雄榜</h2>
            <ul id="leaderboardList">
                <li>載入中...</li>
            </ul>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
